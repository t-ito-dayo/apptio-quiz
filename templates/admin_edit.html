{% extends "base.html" %}
{% block content %}
<div class="admin-wrap">
  <h2 class="page-title">✏️ 問題編集</h2>
  <div class="admin-id-label">ID: {{ q.id }}</div>

  <form method="post" class="edit-form">
    <div class="form-group">
      <label>PJ</label>
      <select name="pj_id" class="form-select">
        <option value="">— なし —</option>
        {% for pj in projects %}
        <option value="{{ pj.id }}" {% if q.pj_id == pj.id %}selected{% endif %}>{{ pj.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>カテゴリ</label>
      <input type="text" name="category" value="{{ q.category }}" class="form-input" required>
    </div>

    <div class="form-group">
      <label>問題文</label>
      <textarea name="question" class="form-textarea" rows="3" required>{{ q.question }}</textarea>
    </div>

    <div class="form-group">
      <label>選択肢</label>
      {% for i in range(4) %}
      <div class="choice-row">
        <span class="choice-label">{{ i }}</span>
        <input type="text" name="choice{{ i }}" value="{{ q.choices[i] }}" class="form-input" required>
      </div>
      {% endfor %}
    </div>

    <div class="form-group">
      <label>正解（番号 0〜3）</label>
      <input type="number" name="answer" value="{{ q.answer }}" min="0" max="3" class="form-input-sm" required>
    </div>

    <div class="form-group">
      <label>解説</label>
      <textarea name="explanation" class="form-textarea" rows="5" required>{{ q.explanation }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">保存</button>
      <a href="/admin" class="btn-ghost">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
