{% extends "base.html" %}
{% block content %}
<div class="admin-wrap">
  <h2 class="page-title">➕ 問題追加</h2>

  <form method="post" class="edit-form">
    <div class="form-group">
      <label>PJ</label>
      <select name="pj_id" class="form-select">
        <option value="">— なし —</option>
        {% for pj in projects %}
        <option value="{{ pj.id }}">{{ pj.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>カテゴリ</label>
      <input type="text" name="category" class="form-input" placeholder="例：TBM基礎" required>
    </div>

    <div class="form-group">
      <label>問題文</label>
      <textarea name="question" class="form-textarea" rows="3" required></textarea>
    </div>

    <div class="form-group">
      <label>選択肢</label>
      {% for i in range(4) %}
      <div class="choice-row">
        <span class="choice-num">{{ i }}</span>
        <input type="text" name="choice{{ i }}" class="form-input" required>
      </div>
      {% endfor %}
    </div>

    <div class="form-group">
      <label>正解（番号 0〜3）</label>
      <input type="number" name="answer" value="0" min="0" max="3" class="form-input-sm" required>
    </div>

    <div class="form-group">
      <label>解説</label>
      <textarea name="explanation" class="form-textarea" rows="5" required></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">追加</button>
      <a href="/admin" class="btn-ghost">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
