{% extends "base.html" %}
{% block content %}
<div class="review-wrap">
  <h2 class="page-title">🔄 復習</h2>

  {% if questions %}
  <p class="review-count">{{ questions|length }}問 復習できます</p>
  {% for q in questions %}
  <div class="review-card">
    <div class="review-category">{{ q.category }}</div>
    <p class="review-question">{{ q.question }}</p>
    <form method="post" action="/review/answer">
      <input type="hidden" name="question_id" value="{{ q.id }}">
      <div class="choices">
        {% for choice in q.choices %}
        <label class="choice-label" for="r{{ q.id }}_{{ loop.index0 }}">
          <input type="radio" name="choice" id="r{{ q.id }}_{{ loop.index0 }}" value="{{ loop.index0 }}" required>
          <span class="choice-text">{{ choice }}</span>
        </label>
        {% endfor %}
      </div>
      <button type="submit" class="btn-primary">回答する</button>
    </form>
  </div>
  {% endfor %}
  {% else %}
  <div class="empty-state">
    <div class="empty-icon">🎉</div>
    <p>復習する問題がありません！</p>
    <a href="/quiz" class="btn-primary">クイズに挑戦する</a>
  </div>
  {% endif %}
</div>
{% endblock %}
